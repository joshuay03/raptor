steps:
  - label: ":ruby: Ruby 4.0"
    image: "ruby:4.0"
    commands:
      - ruby -v
      - bundle install
      - bundle exec rake ci

  - label: ":ruby: Ruby 4.0 +YJIT"
    image: "ruby:4.0"
    env:
      RUBY_YJIT_ENABLE: "1"
    commands:
      - ruby -v
      - bundle install
      - bundle exec rake ci

  - label: ":ruby: Ruby head"
    soft_fail: true
    image: "rubylang/ruby:master-dev"
    commands:
      - apt-get update && apt-get install -y libyaml-dev
      - ruby -v
      - bundle install
      - bundle exec rake ci

  - label: ":ruby: Ruby head +YJIT"
    soft_fail: true
    image: "rubylang/ruby:master-dev"
    env:
      RUBY_YJIT_ENABLE: "1"
    commands:
      - apt-get update && apt-get install -y libyaml-dev
      - ruby -v
      - bundle install
      - bundle exec rake ci
